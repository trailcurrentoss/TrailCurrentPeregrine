# Peregrine clock sources its time from the Headwaters appliance on the
# vehicle/trailer LAN. headwaters.local is resolved via mDNS (libnss-mdns
# + avahi-daemon). FallbackNTP keeps the clock sane on networks where
# Headwaters is not reachable (bench/dev).
[Time]
NTP=headwaters.local
FallbackNTP=pool.ntp.org
