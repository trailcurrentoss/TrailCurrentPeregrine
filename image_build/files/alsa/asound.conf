# TrailCurrent Peregrine — ALSA default device config
# Pin the Jabra Speak USB as the default capture and playback device.
# The onboard QCS6490 audio codec (card 1) is not connected to any
# speakers/microphones — only the Jabra matters.

defaults.pcm.card 0
defaults.pcm.device 0
defaults.ctl.card 0
